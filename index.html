body {

.box {

h1 {

p {

label {

button:last-of-type { 
background: #9e9e9e;
margin-top: 8px;

background: #757575

#ketqua {

 /* ===== ĐỔI NỀN THEO SỨC KHOẺ =====*/  
body.good {

body.ok {

}
body.bad {

.box {

#meo {

 }  
  #meo h3{

.bmi-bar {

  border-radius: 12px;
  overflow: hidden;
  margin-top: 20px;

/* Chia đúng tỷ lệ 10 → 40 */
.under  { width: 17%; background: #6EC1E4; }   /* xanh dương nhạt */
.normal { width: 13%; background: #8BC34A; }   /* xanh lá */
.over   { width: 10%; background: #F4D03F; }   /* vàng */
.obese1  { width: 20%; background: #F39C12; }   /* cam */
.obese2  { width: 40%; background: #CD3700; }

.zone {

}

#marker {

.menu-card{
background:#f8fff8;

.menu-card:hover{

</head>

<script>

document.getElementById("home").style.display="none";
document.getElementById("health").style.display="none";

document.getElementById(page).style.display="block";
}

function goHome(){
document.getElementById("home").style.display="block";
document.getElementById("health").style.display="none";
document.getElementById("workout").style.display="none";
}
function tinhKetQua() {

  let vandong = Number(document.getElementById("vandong").value);
  let ngu = Number(document.getElementById("ngu").value);
  let gioNgu = Number(document.getElementById("gioNgu").value);
  let dt = Number(document.getElementById("dt").value);

  if (!age || !weight || !heightCm || !nuoc ||isNaN(vandong)|| !ngu || !gioNgu || !dt) {
    alert("Nhập thiếu thông tin rồi kìa 😠");
    return;

  if (heightCm < 50 || heightCm > 250) {
  alert("Chiều cao nhập chưa hợp lý nha 😅");

}

  alert("Tuổi nhập chưa hợp lý nha 😅");
  return;
}

  if (vandong >= 30) diem += 2;

  if (gioNgu >= 21 && gioNgu <= 23) diem += 2;
  if (dt <= 4) diem += 2;

  let heightM = heightCm / 100;
  let bmi = weight / (heightM * heightM);

let maxBMI = 60;

if (percent < 0) percent = 0;
if (percent > 100) percent = 100;

document.getElementById("marker").style.left = percent + "%";

  let bmiText = "";

else if (bmiNumber < 25) bmiText = "Bình thường";

else if (bmiNumber > 40) bmiText = "Béo phì nặng";

  chiTiet += gioTre[Math.floor(Math.random() * gioTre.length)] + "<br>";

if (dt <= 4) {

  ];

  chiTiet += dtNhieu[Math.floor(Math.random() * dtNhieu.length)] + "<br>";
}
  
  let bmiAdvice = "";
 
  if (bmiNumber < 18.5) {

   "Chỉ số BMI của bạn đang ở mức thiếu cân. Điều này có thể khiến cơ thể dễ mệt mỏi và sức đề kháng kém hơn. Bạn nên ăn đủ 3 bữa chính mỗi ngày, bổ sung thêm bữa phụ với sữa, trứng, cá, thịt và các thực phẩm giàu dinh dưỡng. Đồng thời ngủ đủ giấc và vận động nhẹ nhàng để cơ thể phát triển khỏe mạnh hơn nhé 💛",

let current=0;

function showWorkout(){
let goal=document.getElementById("goal").value;
let w=workouts[goal][current];

document.getElementById("workoutBox").innerHTML=
`<h3>${w.name}</h3>
<img src="${w.img}" width="140">
<p>${w.desc}</p>`;
}

function nextWorkout(){
let goal=document.getElementById("goal").value;
current=(current+1)%workouts[goal].length;
showWorkout();
}

function prevWorkout(){
let goal=document.getElementById("goal").value;
current=(current-1+workouts[goal].length)%workouts[goal].length;
showWorkout();
}
