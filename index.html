<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🤓 EduHealth 🍀</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:'Segoe UI',Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.5s;
  background:#f5f5f5;
}

.box{
  background:rgba(255,252,245,0.96);
  width:430px;
  padding:25px 30px;
  border-radius:20px;
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1,h2{
  text-align:center;
  color:#4f6f52;
}

p{
  text-align:center;
  color:#555;
}

label{
  display:block;
  margin-top:12px;
  font-weight:600;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

input:focus,
select:focus{
  outline:none;
  border-color:#2c7be5;
  box-shadow:0 0 5px rgba(44,123,229,0.5);
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  background:#7fb77e;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#6aa76a;
}

.secondary{
  background:#9e9e9e;
}

.secondary:hover{
  background:#757575;
}

#ketqua{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f1f7ff;
  font-size:14px;
}

body.good{
  background:#c8f7c5;
}

body.ok{
  background:#fff3b0;
}

body.bad{
  background:#e57373;
}

#meo{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:#e8f5e9;
  color:#2e7d32;
}

/* BMI */
.bmi-bar{
  position:relative;
  display:flex;
  height:55px;
  border-radius:12px;
  overflow:hidden;
  margin-top:20px;
  font-size:13px;
  font-weight:600;
}

.under{width:17%;background:#6EC1E4;}
.normal{width:13%;background:#8BC34A;}
.over{width:10%;background:#F4D03F;}
.obese1{width:20%;background:#F39C12;}
.obese2{width:40%;background:#CD3700;}

.zone{
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

#marker{
  position:absolute;
  top:-8px;
  width:6px;
  height:70px;
  background:#222;
  border-radius:10px;
  transition:left .5s ease;
}

/* menu */
.menu-card{
  padding:25px;
  border-radius:20px;
  cursor:pointer;
  text-align:center;
  transition:.3s;
  margin-top:18px;
}

.menu-card:hover{
  transform:scale(1.03);
}

.green{
  background:#e8f5e9;
}

.yellow{
  background:#fff8e1;
}

/* workout */
#workoutBox{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:#f8fff8;
  text-align:center;
}

#workoutBox img,
#workoutBox video{
  width:220px;
  height:220px;
  object-fit:contain;
  border-radius:18px;
  margin:15px 0;
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.workout-buttons{
  display:flex;
  gap:10px;
}

.workout-buttons button{
  flex:1;
}
</style>
</head>

<body>

<!-- HOME -->
<div class="box" id="home">

<h1>🤓 EduHealth 🍀</h1>
<p>Chọn chức năng bạn muốn</p>

<div class="menu-card green" onclick="openPage('health')">
<h2>🩺 Đánh giá sức khỏe</h2>
<p>Tính BMI + đánh giá thói quen sống</p>
</div>

<div class="menu-card yellow" onclick="openPage('workout')">
<h2>🏋️ Bài tập sức khỏe</h2>
<p>Bài tập theo mục tiêu</p>
</div>

</div>

<!-- HEALTH -->
<div class="box" id="health" style="display:none;">

<button onclick="goHome()">⬅ Quay lại</button>

<h1>🤓 EduHealth 🍀</h1>
<p>Nhập thông tin để đánh giá sức khỏe</p>

<label>1. Tuổi</label>
<input id="age" type="number">

<label>2. Chiều cao (cm)</label>
<input id="height" type="number">

<label>3. Cân nặng (kg)</label>
<input id="weight" type="number">

<label>4. Số ly nước/ngày</label>
<input id="nuoc" type="number">

<label>5. Số phút vận động/ngày</label>
<input id="vandong" type="number">

<label>6. Số giờ ngủ</label>
<input id="ngu" type="number">

<label>7. Giờ đi ngủ</label>
<input id="gioNgu" type="number" step="0.1">

<label>8. Số giờ dùng điện thoại</label>
<input id="dt" type="number">

<button onclick="tinhKetQua()">Xem kết quả</button>
<button class="secondary" onclick="lamLai()">Làm lại 🔄</button>

<div id="ketqua"></div>

<div class="bmi-bar" id="bmiSection" style="display:none;">
<div class="zone under">Thiếu cân</div>
<div class="zone normal">Bình thường</div>
<div class="zone over">Thừa cân</div>
<div class="zone obese1">Béo phì</div>
<div class="zone obese2">Béo phì nặng</div>
<div id="marker"></div>
</div>

<div id="meo"></div>

</div>

<!-- WORKOUT -->
<div class="box" id="workout" style="display:none;">

<button onclick="goHome()">⬅ Quay lại</button>

<h2>🏋️ Bài tập sức khỏe</h2>

<select id="goal" onchange="changeGoal()">
<option value="height">📏 Tăng chiều cao</option>
<option value="lose">🔥 Giảm mỡ</option>
<option value="gain">💪 Tăng cơ</option>
<option value="student">📚 Chống mệt mỏi</option>
</select>

<div id="workoutBox"></div>

<div class="workout-buttons">
<button onclick="prevWorkout()">⬅️ Trước</button>
<button onclick="nextWorkout()">Tiếp ➡️</button>
</div>

</div>

<script>

function openPage(page){
  home.style.display="none";
  health.style.display="none";
  workout.style.display="none";

  document.getElementById(page).style.display="block";

  if(page==="workout"){
    showWorkout();
  }
}

function goHome(){
  home.style.display="block";
  health.style.display="none";
  workout.style.display="none";
}

function tinhKetQua(){

  let age=Number(age.value);
  let heightCm=Number(height.value);
  let weight=Number(weight.value);
  let nuoc=Number(document.getElementById("nuoc").value);
  let vandong=Number(document.getElementById("vandong").value);
  let ngu=Number(document.getElementById("ngu").value);
  let gioNgu=Number(document.getElementById("gioNgu").value);
  let dt=Number(document.getElementById("dt").value);

  if(!age || !heightCm || !weight){
    alert("Nhập thiếu thông tin 😅");
    return;
  }

  let diem=0;

  if(nuoc>=8) diem+=2;
  if(vandong>=30) diem+=2;
  if(ngu>=7 && ngu<=9) diem+=2;
  if(gioNgu<=23) diem+=2;
  if(dt<=4) diem+=2;

  let bmi=(weight/((heightCm/100)**2)).toFixed(1);

  let bmiText="";

  if(bmi<18.5) bmiText="Thiếu cân";
  else if(bmi<25) bmiText="Bình thường";
  else if(bmi<30) bmiText="Thừa cân";
  else if(bmi<40) bmiText="Béo phì";
  else bmiText="Béo phì nặng";

  bmiSection.style.display="flex";

  let percent=((bmi-10)/(60-10))*100;
  percent=Math.max(0,Math.min(100,percent));

  marker.style.left=`calc(${percent}% - 3px)`;

  let color="bad";

  if(diem>=8) color="good";
  else if(diem>=5) color="ok";

  document.body.className=color;

  ketqua.innerHTML=`
  <p><b>Tuổi:</b> ${age}</p>
  <p><b>Điểm sức khỏe:</b> ${diem}/10</p>
  <p><b>BMI:</b> ${bmi} (${bmiText})</p>
  `;

  const tips=[
    "💧 Uống đủ nước giúp tập trung tốt hơn.",
    "😴 Ngủ trước 23h giúp phục hồi cơ thể.",
    "🏃‍♂️ Đi bộ mỗi ngày giúp tim khỏe hơn.",
    "📵 Hạn chế điện thoại trước khi ngủ."
  ];

  meo.innerHTML=`<b>💡 Mẹo:</b><br>${tips[Math.floor(Math.random()*tips.length)]}`;
}

function lamLai(){

  document.querySelectorAll("input").forEach(i=>{
    i.value="";
  });

  ketqua.innerHTML="";
  meo.innerHTML="";
  bmiSection.style.display="none";

  document.body.className="";
}

/* workout */

const workouts={

height:[
{
name:"Hít xà",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/hitxa/main/hitxa.mp4",
desc:"8 cái x 3 lần"
},
{
name:"Nhảy dây",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/nhayday/main/nhayday.mp4",
desc:"10 phút"
}
],

lose:[
{
name:"Gập bụng",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/gapbung/main/gapbung.mp4",
desc:"15 lần"
},
{
name:"Plank",
img:"https://raw.githubusercontent.com/nguyennhuquynh0902/Plant/main/plant.jpg",
desc:"45 giây"
}
],

gain:[
{
name:"Push-up",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/hitdat/main/hitdat.mp4",
desc:"20 lần"
},
{
name:"Squat",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/squat/main/squat.mp4",
desc:"20 lần"
}
],

student:[
{
name:"Giãn cổ",
img:"https://raw.githubusercontent.com/nguyennhuquynh0902/baitapco/main/baitapco.jpg",
desc:"2 phút"
},
{
name:"Hít thở sâu",
video:"https://raw.githubusercontent.com/nguyennhuquynh0902/hitthosau/main/hitthosau.mp4",
desc:"5 phút"
}
]

};

let current=0;

function changeGoal(){
  current=0;
  showWorkout();
}

function showWorkout(){

  let goal=goalSelect();
  let w=workouts[goal][current];

  let media="";

  if(w.video){
    media=`
    <video autoplay muted loop playsinline controls>
      <source src="${w.video}" type="video/mp4">
    </video>`;
  }

  else{
    media=`<img src="${w.img}">`;
  }

  workoutBox.innerHTML=`
    <h3>${w.name}</h3>
    ${media}
    <p>${w.desc}</p>
  `;
}

function goalSelect(){
  return document.getElementById("goal").value;
}

function nextWorkout(){

  let goal=goalSelect();

  current++;

  if(current>=workouts[goal].length){
    current=0;
  }

  showWorkout();
}

function prevWorkout(){

  let goal=goalSelect();

  current--;

  if(current<0){
    current=workouts[goal].length-1;
  }

  showWorkout();
}

showWorkout();

</script>

</body>
</html>
